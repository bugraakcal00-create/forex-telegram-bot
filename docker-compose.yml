version: "3.9"

services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - web

  web:
    build: .
    command: python web_main.py
    env_file: .env
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
